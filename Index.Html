<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COSSIO | MÚSICA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --gold: #c9a84c;
    --gold-light: #e8d08a;
    --cream: #f5f0e8;
    --deep: #0a0804;
    --mid: #1a1408;
  }

  html, body {
    height: 100%;
    background: var(--deep);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    overflow-x: hidden;
  }

  /* ── BACKGROUND ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background: radial-gradient(ellipse 80% 60% at 50% 0%, #2a1f08 0%, #0a0804 60%);
  }
  .bg::before {
    content: '';
    position: absolute; inset: 0;
    background-image:
      radial-gradient(1px 1px at 20% 30%, rgba(201,168,76,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 80% 15%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 55% 60%, rgba(201,168,76,0.25) 0%, transparent 100%),
      radial-gradient(1px 1px at 35% 80%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 75%, rgba(201,168,76,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 10% 60%, rgba(201,168,76,0.15) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 45%, rgba(201,168,76,0.2) 0%, transparent 100%),
      radial-gradient(1px 1px at 45% 20%, rgba(201,168,76,0.35) 0%, transparent 100%);
  }
  .light-ray {
    position: fixed;
    top: -20%;
    left: 50%;
    transform: translateX(-50%);
    width: 2px;
    height: 80vh;
    background: linear-gradient(to bottom, rgba(201,168,76,0.6), transparent);
    filter: blur(8px);
    animation: pulse-ray 4s ease-in-out infinite;
    z-index: 0;
  }
  .light-ray::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 120px;
    height: 120px;
    background: radial-gradient(circle, rgba(201,168,76,0.3) 0%, transparent 70%);
    filter: blur(20px);
  }
  @keyframes pulse-ray {
    0%,100% { opacity: 0.6; }
    50% { opacity: 1; }
  }

  /* ── LAYOUT ── */
  .container {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 24px 80px;
  }

  /* ── HERO IMAGE ── */
  .hero-wrap {
    margin-bottom: 28px;
    animation: float 6s ease-in-out infinite;
    position: relative;
  }
  @keyframes float {
    0%,100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .hero-img {
    width: 140px;
    height: 140px;
    border-radius: 50%;
    object-fit: cover;
    object-position: top center;
    border: 2px solid rgba(201,168,76,0.5);
    box-shadow: 0 0 40px rgba(201,168,76,0.2), 0 0 80px rgba(201,168,76,0.1);
    display: block;
    margin: 0 auto;
  }
  .hero-glow {
    position: absolute;
    inset: -15px;
    border-radius: 50%;
    background: radial-gradient(circle, rgba(201,168,76,0.15) 0%, transparent 70%);
    filter: blur(15px);
    animation: pulse-ray 3s ease-in-out infinite;
  }

  /* ── HEADER ── */
  .name {
    font-family: 'Cinzel Decorative', serif;
    font-size: clamp(28px, 8vw, 52px);
    font-weight: 700;
    letter-spacing: 0.08em;
    color: var(--gold-light);
    text-align: center;
    line-height: 1.1;
    text-shadow: 0 0 40px rgba(201,168,76,0.4);
    animation: reveal 1s ease both;
  }
  .divider {
    width: 80px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 16px auto;
    animation: reveal 1s 0.2s ease both;
  }
  .tagline {
    font-size: clamp(13px, 3.5vw, 17px);
    font-style: italic;
    font-weight: 300;
    color: rgba(245,240,232,0.65);
    text-align: center;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    animation: reveal 1s 0.3s ease both;
  }
  .verse {
    font-size: clamp(12px, 3vw, 15px);
    font-style: italic;
    color: rgba(201,168,76,0.7);
    text-align: center;
    margin-top: 12px;
    letter-spacing: 0.05em;
    animation: reveal 1s 0.4s ease both;
  }

  @keyframes reveal {
    from { opacity: 0; transform: translateY(16px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* ── LINKS ── */
  .links {
    display: flex;
    flex-direction: column;
    gap: 14px;
    width: 100%;
    max-width: 360px;
    margin-top: 44px;
  }

  .link-btn {
    display: flex;
    align-items: center;
    gap: 16px;
    padding: 16px 22px;
    border: 1px solid rgba(201,168,76,0.25);
    border-radius: 3px;
    background: rgba(201,168,76,0.04);
    color: var(--cream);
    text-decoration: none;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    font-weight: 400;
    letter-spacing: 0.08em;
    transition: all 0.3s ease;
    position: relative;
    overflow: hidden;
    animation: reveal 1s ease both;
  }
  .link-btn:nth-child(1) { animation-delay: 0.5s; }
  .link-btn:nth-child(2) { animation-delay: 0.65s; }
  .link-btn:nth-child(3) { animation-delay: 0.8s; }
  .link-btn:nth-child(4) { animation-delay: 0.95s; }

  .link-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(201,168,76,0.08), transparent);
    transform: translateX(-100%);
    transition: transform 0.5s ease;
  }
  .link-btn:hover::before { transform: translateX(100%); }
  .link-btn:hover {
    border-color: rgba(201,168,76,0.6);
    background: rgba(201,168,76,0.08);
    transform: translateY(-2px);
    box-shadow: 0 8px 30px rgba(201,168,76,0.15);
  }

  .icon {
    width: 36px;
    height: 36px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 50%;
  }
  .icon svg { width: 20px; height: 20px; }

  .icon-spotify { background: #1DB954; }
  .icon-apple   { background: #fc3c44; }
  .icon-youtube { background: #FF0000; }
  .icon-ig      { background: linear-gradient(135deg, #f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%); }

  .btn-label { flex: 1; }
  .btn-platform { font-size: 11px; letter-spacing: 0.12em; color: rgba(245,240,232,0.45); text-transform: uppercase; display: block; }
  .btn-action { font-size: 15px; color: var(--cream); }

  .arrow {
    opacity: 0.35;
    font-size: 18px;
    transition: opacity 0.3s, transform 0.3s;
  }
  .link-btn:hover .arrow { opacity: 0.8; transform: translateX(4px); }

  /* ── FOOTER ── */
  .footer {
    margin-top: 52px;
    text-align: center;
    font-size: 11px;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(201,168,76,0.35);
    animation: reveal 1s 1.1s ease both;
  }
</style>
</head>
